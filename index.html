<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação The Boys</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background: #111; color: #fff; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #e50914; border: none; border-radius: 8px; color: #fff; }
        button:hover { background: #ff1414; }
    </style>
</head>
<body>
    <h1>Verificação The Boys</h1>
    <p>Clique no botão para verificar:</p>
    <button id="verificarBtn">Verificar Agora</button>

    <script>
        const btn = document.getElementById('verificarBtn');
        btn.addEventListener('click', async () => {
            try {
                const res = await fetch('/api/verificar');
                const text = await res.text();
                alert(text);
            } catch (err) {
                alert('❌ Ocorreu um erro ao verificar!');
            }
        });
    </script>
</body>
</html>
